# ═══════════════════════════════════════════════════════
# k8s/storage.yml — Persistent Volume Claims
# ═══════════════════════════════════════════════════════
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc
  namespace: rag-saas
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: rag-saas
spec:
  accessModes:
    - ReadWriteOnce
